name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: pool_name_windows_x64
    displayName: 'Windows x64 Pool'
    type: string
    default: 'Azure-MessagingStore-Win-x64-Dadsv5-v19'
  - name: pool_name_windows_arm64
    displayName: 'Windows ARM64 Pool'
    type: string
    default: 'Azure-MessagingStore-Win-ARM64-Dpldsv6-v01'
  - name: pool_name_linux
    displayName: 'Linux Pool'
    type: string
    default: 'Azure-MsgStore-Linux2204BuildMachinePool'

resources:
  repositories:
  - repository: self
    clean: true
  - repository: c_build_tools
    type: github
    name: azure/c-build-tools
    endpoint: github.com_azure
    ref: 3a6192f17dadb8642841bbc02b3dd1ab86dbca94

jobs:
- template: /pipeline_templates/build_all_flavors.yml@c_build_tools
  parameters:
    # Preserve existing x64 coverage of int / perf / e2e categories. The new
    # c-build-tools strict UNIT_TESTS semantic would otherwise filter them out.
    MAX_STAGE_x64: ALL
    pool_name_x64: ${{ parameters.pool_name_windows_x64 }}
    pool_name_arm64: ${{ parameters.pool_name_windows_arm64 }}

- template: /pipeline_templates/run_master_check.yml@c_build_tools
  parameters:
    pool_name: ${{ parameters.pool_name_windows_x64 }}

- template: /pipeline_templates/codeql3000_default.yml@c_build_tools
  parameters:
    pool_name: 'Azure-MessagingStore-Win-x64-Dadsv7-v03'

- template: /pipeline_templates/build_linux.yml@c_build_tools
  parameters:
    pool_name: ${{ parameters.pool_name_linux }}
